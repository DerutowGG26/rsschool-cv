                    <span></span><span></span><span></span>

                        <li><a href="index.html#about" class="nav__link">ABOUT</a></li>
                        <li><a href="#" class="nav__link active disabled-link">GIFTS</a></li>
                        <li><a href="#contacts" class="nav__link">CONTACTS</a></li>

            <h1 class="h1" style="text-align: center; margin: 4rem 0 2rem;">OUR MAGICAL GIFTS</h1>
            
            <div class="tabs">
                <button class="tab active" data-filter="all">ALL</button>

                <button class="tab" data-filter="harmony">FOR HARMONY</button>
            </div>

            <div class="gifts-grid" id="giftsGrid"></div>
        </main>

        <footer class="footer container" id="contacts" style="margin-top: 5rem;">
            <div class="footer__contacts">
                <a href="tel:+375291112233" class="contact-card">
                    <div class="c-icon">🎅</div>
                    <p class="c-val">+375 (29) 111-22-33</p>
                    <p class="c-label">CALL US</p>

                <a href="https://maps.google.com" target="_blank" class="contact-card">

                        <div id="mRatings" class="ratings-list"></div>
